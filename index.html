<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack — Dashboard</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>

<body>
  <div class="app">

    <!-- NAVBAR -->
    <header class="navbar glass-card">
      <div class="brand">
        <span class="logo-cube"></span>
        <span class="brand-text">FinTrack</span>
      </div>

      <div class="nav-right">
        <div id="monthDisplay" class="month-display" aria-live="polite"></div>
        <button id="logoutBtn" class="btn-secondary" type="button">Logout</button>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main-grid">

      <!-- LEFT -->
      <section class="left-panel">

        <div class="summary-grid" aria-label="Monthly financial summary">
          <div class="summary-card glass-card card-3d">
            <h3>Monthly Income</h3>
            <p id="incomeValue" class="summary-value">₹0</p>
          </div>
          <div class="summary-card glass-card card-3d">
            <h3>Budget Limit</h3>
            <p id="budgetValue" class="summary-value">₹0</p>
          </div>
          <div class="summary-card glass-card card-3d">
            <h3>Total Spent</h3>
            <p id="spentValue" class="summary-value">₹0</p>
          </div>
          <div class="summary-card glass-card card-3d">
            <h3>Remaining</h3>
            <p id="remainingValue" class="summary-value">₹0</p>
          </div>
        </div>

        <!-- Budget -->
        <div class="glass-card card-3d form-card">
          <h2>Set Monthly Budget</h2>
          <form id="budgetForm" novalidate>
            <div class="form-group">
              <label for="incomeInput">Monthly income</label>
              <input
                id="incomeInput"
                type="number"
                min="0"
                step="0.01"
                placeholder="e.g. 50,000"
                required
              />
            </div>
            <div class="form-group">
              <label for="budgetInput">Budget limit</label>
              <input
                id="budgetInput"
                type="number"
                min="0"
                step="0.01"
                placeholder="e.g. 30,000"
                required
              />
            </div>
            <button type="submit" class="btn-primary">Save Budget</button>
          </form>
        </div>

        <!-- Expense -->
        <div class="glass-card card-3d form-card">
          <h2>Add Expense</h2>
          <form id="expenseForm" novalidate>
            <div class="form-group">
              <label for="titleInput">Title</label>
              <input id="titleInput" placeholder="e.g. Groceries" required />
            </div>
            <div class="form-group">
              <label for="amountInput">Amount</label>
              <input
                id="amountInput"
                type="number"
                min="0"
                step="0.01"
                placeholder="e.g. 1,200"
                required
              />
            </div>
            <div class="form-group">
              <label for="categoryInput">Category</label>
              <select id="categoryInput">
                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Bills</option>
                <option>Entertainment</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="dateInput">Date</label>
              <input id="dateInput" type="date" required />
            </div>
            <button type="submit" class="btn-primary">Add Expense</button>
          </form>
        </div>

      </section>

      <!-- RIGHT -->
      <section class="right-panel">
        <div class="glass-card chart-card">
          <h2>Spending by Category</h2>
          <canvas id="expenseChart"></canvas>
        </div>

        <div class="glass-card table-card">
          <h2>Recent Expenses</h2>
          <div class="table-wrapper">
            <table aria-label="Recent expenses">
              <thead>
                <tr>
                  <th scope="col">Title</th>
                  <th scope="col">Category</th>
                  <th scope="col">Amount</th>
                  <th scope="col">Date</th>
                  <th scope="col" class="actions-header">Actions</th>
                </tr>
              </thead>
              <tbody id="expenseTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCnhYkubvXjU_hmVHfVdmt5rcyA1mdIi3A",
      authDomain: "expense---tracker-9957e.firebaseapp.com",
      projectId: "expense---tracker-9957e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 🔐 AUTH GUARD
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      }
    });

    // LOGOUT
    document.getElementById("logoutBtn").onclick = async () => {
      await auth.signOut();
      window.location.href = "login.html";
    };
  </script>

  <!-- App Logic -->
  <script src="app.js"></script>

</body>
</html>
